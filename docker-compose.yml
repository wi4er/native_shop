version: "2.2"

services:
  mongo:
    image: mongo:5.0.4
    container_name: native_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - ./data/mongo:/data/db:rw
      - ./init:/docker-entrypoint-initdb.d

  product:
    image: wi4er/groot:0.13.2
    container_name: native_product_api
    environment:
      DB_HOST: mongo
      DB_USER: product
      DB_PASSWORD: example
      DB_NAME: product
      CACHE_HOST: cache
    links:
      - mongo
      - cache
    ports:
      - "8081:8080"

  banner:
    image: wi4er/groot:0.13.2
    container_name: native_banner_api
    environment:
      DB_HOST: mongo
      DB_USER: banner
      DB_PASSWORD: example
      DB_NAME: banner
      CACHE_HOST: cache
    links:
      - mongo
      - cache
    ports:
      - "8082:8080"

  order:
    image: wi4er/groot:0.13.2
    container_name: native_order_api
    environment:
      DB_HOST: mongo
      DB_USER: order
      DB_PASSWORD: example
      DB_NAME: order
      CACHE_HOST: cache
    links:
      - mongo
      - cache
    ports:
      - "8083:8080"

  cache:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data/
